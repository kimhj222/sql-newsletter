<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL 실습 위젯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf8;--surface:#fff;--surface-alt:#f3f3ef;
  --text:#1c1c1a;--text-mid:#5a5a56;--text-light:#8a8a84;
  --border:#e2e2dc;--border-light:#eeeeea;
  --accent:#2d5be3;--accent-hover:#1d4ac7;--accent-bg:#eef2fd;--accent-text:#1d3a8a;
  --success:#1a7f37;--success-bg:#e6f6eb;
  --error:#cf222e;--error-bg:#fde8e8;
  --mono:'JetBrains Mono',monospace;
  --sans:'IBM Plex Sans KR','Pretendard',system-ui,sans-serif;
  --radius:8px;--radius-sm:5px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:900px;margin:0 auto;padding:1rem 1rem 1.5rem}

.header{display:flex;align-items:center;gap:10px;margin-bottom:.75rem;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;letter-spacing:.4px;padding:3px 10px;border-radius:20px;background:var(--accent-bg);color:var(--accent-text)}
.title{font-size:1.1rem;font-weight:600;color:var(--text);line-height:1.3}
.subtitle{width:100%;font-size:.8rem;color:var(--text-mid);margin-top:-2px}

.section-label{font-size:.7rem;font-weight:600;color:var(--text-light);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}

.table-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius) var(--radius) 0 0}
.table-bar .left{display:flex;align-items:center;gap:8px}
.table-bar .tname{font-family:var(--mono);font-size:.8rem;font-weight:500;color:var(--accent);background:var(--accent-bg);padding:1px 7px;border-radius:4px}
.table-bar .tabs-inline{display:flex;gap:0}
.table-bar .tabs-inline button{font-family:var(--sans);font-size:.75rem;padding:3px 10px;border:none;background:none;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent}
.table-bar .tabs-inline button.active{color:var(--accent);border-bottom-color:var(--accent)}
.table-panel{border:1px solid var(--border-light);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;margin-bottom:6px}
.table-wrap{overflow-x:auto;max-height:180px;overflow-y:auto}
table.data{width:100%;border-collapse:collapse;font-size:.75rem;white-space:nowrap}
table.data th{position:sticky;top:0;background:var(--surface-alt);text-align:left;padding:5px 10px;color:var(--text-mid);font-weight:600;border-bottom:1px solid var(--border);z-index:1}
table.data td{padding:4px 10px;border-bottom:1px solid var(--border-light);color:var(--text);font-family:var(--mono);font-size:.72rem}
table.data tbody tr:hover{background:var(--surface-alt)}
.row-count-inline{font-size:.7rem;color:var(--text-light)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.75rem}

.editor-wrap{position:relative}
.editor-card{background:var(--surface);border:1.5px solid var(--accent);border-left:4px solid var(--accent);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s}
.editor-card:focus-within{box-shadow:0 0 0 3px rgba(45,91,227,.12)}
.editor-card-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--accent-bg);border-bottom:1px solid rgba(45,91,227,.15)}
.editor-card-header .label{font-size:.72rem;font-weight:600;color:var(--accent-text);letter-spacing:.3px}
.editor-card-header .cursor-icon{width:14px;height:14px;display:inline-block;border-right:2px solid var(--accent);animation:blink 1s step-end infinite;margin-right:4px}
@keyframes blink{50%{border-color:transparent}}
.editor-card-header .hint-text{font-size:.65rem;color:var(--accent-text);opacity:.7}
textarea.editor{width:100%;height:80px;padding:10px;font-family:var(--mono);font-size:.8rem;line-height:1.6;color:var(--text);background:var(--surface);border:none;resize:none;outline:none}
textarea.editor::placeholder{color:var(--text-light)}

.btn-row{display:flex;gap:6px;margin-top:6px}
.btn{padding:5px 14px;font-size:.78rem;font-weight:500;font-family:var(--sans);border-radius:var(--radius-sm);cursor:pointer;transition:all .12s;border:none}
.btn:active{transform:scale(.97)}
.btn-run{background:var(--accent);color:#fff}
.btn-run:hover{background:var(--accent-hover)}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--text-mid)}
.btn-reset:hover{background:var(--surface-alt)}

.result{margin-top:6px;max-height:160px;overflow-y:auto}
.result .table-wrap{max-height:140px}
.msg-success{font-size:.78rem;color:var(--success);padding:6px 10px;background:var(--success-bg);border-radius:var(--radius-sm)}
.msg-error{font-size:.78rem;color:var(--error);padding:6px 10px;background:var(--error-bg);border-radius:var(--radius-sm);font-family:var(--mono);word-break:break-all}
.msg-mission{display:inline-block;margin-top:4px;font-size:.75rem;color:var(--success);font-weight:500}

.mission-tabs{display:flex;gap:0;margin-bottom:8px;border-bottom:1.5px solid var(--border)}
.mission-tab{font-family:var(--sans);font-size:.78rem;font-weight:500;padding:6px 14px;border:none;background:none;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:color .15s,border-color .15s}
.mission-tab:hover{color:var(--text-mid)}
.mission-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mission-tab .count{font-size:.7rem;font-weight:600;padding:1px 6px;border-radius:10px;margin-left:4px}
.mission-tab .count.done-count{background:var(--success-bg);color:var(--success)}
.mission-tab .count.todo-count{background:var(--surface-alt);color:var(--text-light)}

.missions{display:flex;flex-direction:column;gap:5px}
.mission{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-sm);cursor:pointer;transition:all .12s}
.mission:hover{border-color:var(--border);background:var(--surface-alt)}
.mission.done{border-color:#a3d9b1}
.mission.wrong{border-color:#f09995;animation:shake .3s}
@keyframes shake{25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}}
.mission .check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:10px;color:transparent}
.mission.done .check{background:var(--success);border-color:var(--success);color:#fff}
.mission .num{font-size:.7rem;font-weight:600;color:var(--text-light);flex-shrink:0;min-width:16px}
.mission .text{font-size:.78rem;color:var(--text);line-height:1.4;flex:1}
.mission .hint-tag{font-size:.65rem;color:var(--accent-text);background:var(--accent-bg);padding:1px 6px;border-radius:3px;flex-shrink:0}
.mission-challenge .num{color:var(--error)}

.grade-result{margin-top:8px;padding:8px 12px;border-radius:var(--radius-sm);font-size:.78rem;font-weight:500;display:none}
.grade-result.show{display:block}
.grade-result.correct{background:var(--success-bg);color:var(--success)}
.grade-result.incorrect{background:var(--error-bg);color:var(--error)}

.progress-bar{margin-top:8px;display:flex;align-items:center;gap:8px}
.progress-track{flex:1;height:4px;background:var(--border-light);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--success);border-radius:2px;transition:width .4s ease}
.progress-text{font-size:.7rem;color:var(--text-light);white-space:nowrap}

.loading{display:flex;align-items:center;justify-content:center;min-height:150px;color:var(--text-light);font-size:.85rem}
.loading::after{content:"";width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin-left:8px;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:580px){
  .two-col{grid-template-columns:1fr}
  .wrap{padding:.75rem}
}
</style>
</head>
<body>

<div class="wrap" id="app">
  <div class="loading">SQL 실습 환경을 준비하고 있어요</div>
</div>

<script src="data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<script>
(async function(){
  const L = LESSON;
  let db = null;
  let currentTable = 0;

  const SQL = await initSqlJs({
    locateFile: f => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/' + f
  });
  db = new SQL.Database();
  L.tables.forEach(t => {
    db.run(t.createSQL);
    t.rows.forEach(r => db.run(t.insertSQL, r));
  });

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <div class="badge">${L.id}회차</div>
      <div class="title">${L.title}</div>
      <div class="subtitle">${L.subtitle}</div>
    </div>

    <div class="section-label">예시 테이블</div>
    <div class="table-bar">
      <div class="left">
        <span style="font-size:.78rem;color:var(--text-mid)">테이블명:</span>
        <span class="tname" id="tname">${L.tables[0].name}</span>
        <span class="row-count-inline" id="row-count-top">(${L.tables[0].rows.length}행)</span>
      </div>
      <div class="tabs-inline" id="tabs-inline"></div>
    </div>
    <div class="table-panel">
      <div class="table-wrap" id="table-display"></div>
    </div>

    <div class="two-col">
      <div>
        <div class="section-label">SQL 편집기</div>
        <div class="editor-wrap">
          <div class="editor-card">
            <div class="editor-card-header">
              <div class="label"><span class="cursor-icon"></span>여기에 쿼리를 입력하세요</div>
              <div class="hint-text">Ctrl+Enter로 실행</div>
            </div>
            <textarea class="editor" id="editor" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off" data-gramm="false">${L.defaultQuery}</textarea>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-run" id="btn-run">실행</button>
          <button class="btn btn-reset" id="btn-reset">초기화</button>
        </div>
        <div class="result" id="result"></div>
      </div>
      <div>
        <div class="mission-tabs">
          <button class="mission-tab active" id="tab-practice" onclick="switchMissionTab('practice')">연습문제</button>
          <button class="mission-tab" id="tab-challenge" onclick="switchMissionTab('challenge')">실전문제</button>
        </div>
        <div class="missions" id="missions"></div>
        <div class="progress-bar">
          <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="progress-text" id="progress-text">0 / ${L.practice.length}</div>
        </div>
      </div>
    </div>
  `;

  const tnameEl = document.getElementById('tname');
  const rowCountTop = document.getElementById('row-count-top');
  const tableEl = document.getElementById('table-display');
  const editorEl = document.getElementById('editor');
  const resultEl = document.getElementById('result');
  const missionsEl = document.getElementById('missions');
  const progressFill = document.getElementById('progress-fill');
  const progressText = document.getElementById('progress-text');
  const tabsInline = document.getElementById('tabs-inline');

  L.tables.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.textContent = t.label;
    btn.className = i === 0 ? 'active' : '';
    btn.onclick = (e) => {
      currentTable = i;
      showTable(i);
    };
    tabsInline.appendChild(btn);
  });

  function showTable(idx) {
    tabsInline.querySelectorAll('button').forEach((b, i) => b.classList.toggle('active', i === idx));
    const t = L.tables[idx];
    tnameEl.textContent = t.name;
    rowCountTop.textContent = '(' + t.rows.length + '행)';
    let h = '<table class="data"><thead><tr>' + t.columns.map(c => '<th>' + c + '</th>').join('') + '</tr></thead><tbody>';
    t.rows.forEach(r => {
      h += '<tr>' + r.map(v => '<td>' + v + '</td>').join('') + '</tr>';
    });
    h += '</tbody></table>';
    tableEl.innerHTML = h;
  }
  showTable(0);

  function runQuery() {
    const sql = editorEl.value.trim();
    if (!sql) { resultEl.innerHTML = '<div class="msg-error">쿼리를 입력해주세요</div>'; return; }
    try {
      const res = db.exec(sql);
      if (!res.length) {
        resultEl.innerHTML = '<div class="msg-success">실행 완료 (결과 없음)</div>';
        checkMissions(sql);
        return;
      }
      const r = res[0];
      let h = '<div class="table-wrap"><table class="data"><thead><tr>';
      h += r.columns.map(c => '<th>' + c + '</th>').join('');
      h += '</tr></thead><tbody>';
      r.values.forEach(row => {
        h += '<tr>' + row.map(v => '<td>' + (v === null ? 'NULL' : v) + '</td>').join('') + '</tr>';
      });
      h += '</tbody></table></div>';
      h += '<div style="font-size:.7rem;color:var(--text-light);text-align:right;padding:2px 0;">' + r.values.length + '행</div>';
      const missionPassed = checkMissions(sql);
      if (missionPassed) h += '<div class="msg-mission">미션 완료!</div>';
      resultEl.innerHTML = h;
    } catch (e) {
      resultEl.innerHTML = '<div class="msg-error">' + e.message + '</div>';
    }
  }

  document.getElementById('btn-run').onclick = runQuery;
  document.getElementById('btn-reset').onclick = () => {
    editorEl.value = L.defaultQuery;
    resultEl.innerHTML = '';
  };
  editorEl.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runQuery(); }
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editorEl.selectionStart;
      editorEl.value = editorEl.value.substring(0, s) + '  ' + editorEl.value.substring(editorEl.selectionEnd);
      editorEl.selectionStart = editorEl.selectionEnd = s + 2;
    }
  });

  const completedPractice = new Set();
  const completedChallenge = new Set();
  let currentMissionTab = 'practice';

  window.switchMissionTab = function(tab) {
    currentMissionTab = tab;
    document.getElementById('tab-practice').classList.toggle('active', tab === 'practice');
    document.getElementById('tab-challenge').classList.toggle('active', tab === 'challenge');
    renderMissions();
  };

  function renderMissions() {
    if (currentMissionTab === 'practice') {
      renderPractice();
    } else {
      renderChallenge();
    }
    updateTabCounts();
  }

  function updateTabCounts() {
    const pDone = completedPractice.size;
    const pTotal = L.practice.length;
    const cDone = completedChallenge.size;
    const cTotal = L.challenge.length;
    document.getElementById('tab-practice').innerHTML = '연습문제 <span class="count ' + (pDone === pTotal && pTotal > 0 ? 'done-count' : 'todo-count') + '">' + pDone + '/' + pTotal + '</span>';
    document.getElementById('tab-challenge').innerHTML = '실전문제 <span class="count ' + (cDone === cTotal && cTotal > 0 ? 'done-count' : 'todo-count') + '">' + cDone + '/' + cTotal + '</span>';
  }

  function renderPractice() {
    const items = L.practice;
    const done = completedPractice;
    missionsEl.innerHTML = items.map((m, i) => `
      <div class="mission ${done.has(m.id) ? 'done' : ''}" data-hint="${encodeURIComponent(m.hint)}" data-id="${m.id}" data-type="practice">
        <div class="check">${done.has(m.id) ? '&#10003;' : ''}</div>
        <div class="num">${i + 1}</div>
        <div class="text">${m.text}</div>
        <div class="hint-tag">${done.has(m.id) ? '완료' : '힌트'}</div>
      </div>
    `).join('') + '<div class="grade-result" id="grade-result"></div>';

    missionsEl.querySelectorAll('.mission').forEach(el => {
      el.onclick = () => {
        editorEl.value = decodeURIComponent(el.dataset.hint);
        editorEl.focus();
        runQuery();
      };
    });

    const total = items.length;
    progressFill.style.width = (done.size / total * 100) + '%';
    progressText.textContent = done.size + ' / ' + total + (done.size === total ? '  완료!' : '');
  }

  function renderChallenge() {
    const items = L.challenge;
    const done = completedChallenge;
    missionsEl.innerHTML = items.map((m, i) => `
      <div class="mission mission-challenge ${done.has(m.id) ? 'done' : ''}" data-id="${m.id}" data-type="challenge">
        <div class="check">${done.has(m.id) ? '&#10003;' : ''}</div>
        <div class="num">Q${i + 1}</div>
        <div class="text">${m.text}</div>
      </div>
    `).join('') + '<div class="grade-result" id="grade-result"></div>';

    missionsEl.querySelectorAll('.mission').forEach(el => {
      el.onclick = () => {
        const id = el.dataset.id;
        const challenge = L.challenge.find(c => c.id === id);
        if (!challenge || completedChallenge.has(id)) return;
        gradeChallenge(challenge, el);
      };
    });

    const total = items.length;
    progressFill.style.width = (done.size / total * 100) + '%';
    progressText.textContent = done.size + ' / ' + total + (done.size === total ? '  완료!' : '');
  }

  function gradeChallenge(challenge, el) {
    const sql = editorEl.value.trim();
    if (!sql) {
      showGradeResult('먼저 SQL을 입력하고 실행한 뒤 문제를 클릭하세요', false);
      return;
    }

    try {
      const userResult = db.exec(sql);
      const answerResult = db.exec(challenge.answerQuery);

      if (!userResult.length && !answerResult.length) {
        completedChallenge.add(challenge.id);
        showGradeResult('정답! 결과가 일치합니다', true);
        renderMissions();
        return;
      }

      if (!userResult.length || !answerResult.length) {
        showGradeResult('오답 — 결과가 다릅니다. 다시 시도해보세요', false);
        el.classList.add('wrong');
        setTimeout(() => el.classList.remove('wrong'), 400);
        return;
      }

      const uCols = userResult[0].columns.map(c => c.toLowerCase());
      const aCols = answerResult[0].columns.map(c => c.toLowerCase());
      const uVals = JSON.stringify(userResult[0].values.map(r => r.map(String)).sort());
      const aVals = JSON.stringify(answerResult[0].values.map(r => r.map(String)).sort());

      if (uCols.join(',') === aCols.join(',') && uVals === aVals) {
        completedChallenge.add(challenge.id);
        showGradeResult('정답! 결과가 일치합니다', true);
        renderMissions();
      } else if (uVals === aVals) {
        completedChallenge.add(challenge.id);
        showGradeResult('정답! (컬럼명은 다르지만 결과가 맞습니다)', true);
        renderMissions();
      } else {
        showGradeResult('오답 — 결과가 다릅니다. 다시 시도해보세요 (정답: ' + answerResult[0].values.length + '행)', false);
        el.classList.add('wrong');
        setTimeout(() => el.classList.remove('wrong'), 400);
      }
    } catch (e) {
      showGradeResult('쿼리 오류 — ' + e.message, false);
    }
  }

  function showGradeResult(msg, isCorrect) {
    const el = document.getElementById('grade-result');
    if (!el) return;
    el.className = 'grade-result show ' + (isCorrect ? 'correct' : 'incorrect');
    el.textContent = (isCorrect ? '&#10003; ' : '&#10007; ') + msg;
    el.innerHTML = (isCorrect ? '&#10003; ' : '&#10007; ') + msg;
  }

  function checkMissions(sql) {
    let passed = false;

    L.practice.forEach(m => {
      if (!completedPractice.has(m.id) && m.check(sql)) {
        completedPractice.add(m.id);
        passed = true;
      }
    });

    if (passed) renderMissions();
    return passed;
  }

  renderMissions();
})();
</script>
</body>
</html>
